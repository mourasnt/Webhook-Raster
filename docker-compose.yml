services:
  postgres:
    image: postgres:16-alpine
    container_name: raster-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=webhooks
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhooks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - webhook-net

  redis:
    image: redis:7-alpine
    container_name: raster-redis
    restart: unless-stopped
    # Sem "ports:" — Redis acessível APENAS na rede interna Docker
    networks:
      - webhook-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  webhook-api:
    build: .
    container_name: raster-webhook-api
    restart: unless-stopped
    ports:
      - "1214:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/webhooks
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RATE_LIMIT_URL=redis://redis:6379/1
      - EVENT_TTL_SECONDS=86400
      - RATE_LIMIT=100/minute
      - TIMESTAMP_MAX_AGE_SECONDS=300
      - LOG_LEVEL=INFO
      - LOG_RETENTION_DAYS=30
      - AUDIT_LOG_FILE=logs/audit.json
      - ENCRYPTION_KEY=_3-MRU8UvuARYWKqWoXQtFZVI8EOJMFwENdAWFwyP-g=
      - GOOGLE_DRIVE_FOLDER_ID=0AIjOcO48LrX1Uk9PVA
      - GOOGLE_CREDENTIALS_FILE=credentials.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - webhook-net
    volumes:
      - webhook-logs:/app/logs
      - ./credentials.json:/app/credentials.json:ro

networks:
  webhook-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  webhook-logs:
    driver: local
